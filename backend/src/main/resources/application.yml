server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 3000
      minimum-idle: 0
jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}